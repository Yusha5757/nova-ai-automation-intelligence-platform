<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">NOVA Commercial AI Automation Intelligence Platform</title>
  <desc id="desc">Technical portfolio banner showing a multi-agent orchestration fabric.</desc>
  <defs>
