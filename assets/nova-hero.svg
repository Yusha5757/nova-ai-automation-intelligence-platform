      <rect x="354" width="182" height="38" rx="19" fill="#fff" fill-opacity=".05" stroke="#fff" stroke-opacity=".18"/><text x="445" y="25" text-anchor="middle" fill="#ddd3c7" font-size="13" font-weight="700">3 SPECIALISTS</text>
    </g>
    <text x="94" y="439" fill="#82786e" font-size="13" letter-spacing="2">N8N  /  GOOGLE GEMINI  /  SUPABASE  /  POSTGRESQL</text>
