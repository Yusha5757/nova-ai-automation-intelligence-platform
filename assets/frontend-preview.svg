<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">NOVA frontend interface preview</title><desc id="desc">A faithful visual reconstruction of the committed editorial HTML interface.</desc>
  <defs><pattern id="paper" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#161513" stroke-opacity=".025"/></pattern><filter id="sh"><feDropShadow dx="0" dy="20" stdDeviation="25" flood-opacity=".18"/></filter></defs>
  <rect width="1600" height="920" rx="26" fill="#e5ded1"/>
  <rect x="38" y="38" width="1524" height="844" rx="20" fill="#f2eee4" filter="url(#sh)"/>
  <rect x="38" y="38" width="1524" height="844" rx="20" fill="url(#paper)"/>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <path d="M324 38V882" stroke="#161513" stroke-opacity=".14"/>
    <g transform="translate(70 78)"><circle cx="22" cy="22" r="21" fill="none" stroke="#161513" stroke-opacity=".45"/><text x="22" y="30" text-anchor="middle" font-family="Georgia,serif" font-size="24" font-style="italic" fill="#161513">N</text><text x="62" y="18" font-size="14" font-weight="800" letter-spacing="4" fill="#161513">NOVA</text><text x="62" y="38" font-size="11" fill="#746e65">Automation Intelligence</text></g>
    <text x="70" y="170" font-size="10" font-weight="800" letter-spacing="3" fill="#746e65">CONNECTION</text>
    <path d="M70 192H290M70 259H290" stroke="#161513" stroke-opacity=".14"/>
    <circle cx="77" cy="220" r="5" fill="#a43e3e"/><text x="93" y="224" font-size="13" font-weight="700" fill="#161513">Not configured</text><text x="70" y="247" font-size="10" fill="#746e65">Add the published n8n Chat URL.</text><text x="238" y="223" font-size="9" text-decoration="underline" fill="#161513">CONFIGURE</text>
    <text x="70" y="306" font-size="10" font-weight="800" letter-spacing="3" fill="#746e65">STARTING POINTS</text>
    <g font-family="Georgia,serif" font-size="15" fill="#161513"><text x="70" y="350">Design a client workflow</text><text x="70" y="400">Review architecture risks</text><text x="70" y="450">Package a sellable offer</text><text x="70" y="500">Build a QA checklist</text></g>
    <g stroke="#161513" stroke-opacity=".14"><path d="M70 368H290M70 418H290M70 468H290M70 518H290"/></g>
    <path d="M70 745H290" stroke="#161513" stroke-opacity=".14"/><text x="70" y="778" font-size="10" fill="#746e65">Gemini and Supabase credentials remain</text><text x="70" y="795" font-size="10" fill="#746e65">inside n8n. The browser stores no secret.</text><text x="70" y="838" font-size="9" text-decoration="underline">NEW SESSION</text><text x="184" y="838" font-size="9" text-decoration="underline">SETTINGS</text>
    <path d="M324 138H1562" stroke="#161513" stroke-opacity=".14"/>
    <text x="374" y="95" font-family="Georgia,serif" font-size="46" fill="#161513">Automation Intelligence</text><text x="376" y="120" font-size="12" fill="#746e65">Architecture, implementation and commercial strategy.</text><text x="1380" y="102" font-size="9" letter-spacing="2" fill="#746e65">SESSION  —</text>
    <g transform="translate(450 230)"><path d="M0 0H44" stroke="#9f4a34"/><text x="60" y="4" font-size="10" letter-spacing="3" fill="#746e65">PRIVATE WORKING ASSISTANT</text><text x="0" y="100" font-family="Georgia,serif" font-size="70" letter-spacing="-3" fill="#161513">Build systems that are</text><text x="0" y="178" font-family="Georgia,serif" font-size="70" font-style="italic" letter-spacing="-3" fill="#9f4a34">useful before they are impressive.</text><text x="0" y="230" font-size="15" fill="#746e65">NOVA routes each request to the appropriate specialist, remembers the discussion,</text><text x="0" y="254" font-size="15" fill="#746e65">retrieves curated guidance and keeps a durable record in Supabase.</text>
      <path d="M0 308H1000" stroke="#161513" stroke-opacity=".35"/><g transform="translate(0 338)"><text fill="#9f4a34" font-size="11" font-weight="800">01</text><text y="39" font-family="Georgia,serif" font-size="22" fill="#161513">Automation Advisor</text><text y="68" font-size="11" fill="#746e65">Workflow planning, implementation guidance</text><text y="85" font-size="11" fill="#746e65">and practical n8n support.</text></g><g transform="translate(340 338)"><path d="M-28 -30V102" stroke="#161513" stroke-opacity=".14"/><text fill="#9f4a34" font-size="11" font-weight="800">02</text><text y="39" font-family="Georgia,serif" font-size="22" fill="#161513">Technical Architect</text><text y="68" font-size="11" fill="#746e65">APIs, Supabase, debugging, reliability</text><text y="85" font-size="11" fill="#746e65">and production security.</text></g><g transform="translate(680 338)"><path d="M-28 -30V102" stroke="#161513" stroke-opacity=".14"/><text fill="#9f4a34" font-size="11" font-weight="800">03</text><text y="39" font-family="Georgia,serif" font-size="22" fill="#161513">Business Strategist</text><text y="68" font-size="11" fill="#746e65">Offers, pricing, proposals, ROI and</text><text y="85" font-size="11" fill="#746e65">client-ready positioning.</text></g></g>
    <path d="M324 772H1562" stroke="#161513" stroke-opacity=".14"/><text x="450" y="824" font-family="Georgia,serif" font-size="17" fill="#9a9489">Ask about a workflow, technical issue or client offer…</text><path d="M450 844H1390" stroke="#161513" stroke-opacity=".35"/><circle cx="1450" cy="820" r="25" fill="#161513"/><path d="M1438 820h21m-8-8 8 8-8 8" fill="none" stroke="#f2eee4" stroke-width="2"/><text x="450" y="866" font-size="8" letter-spacing="1" fill="#746e65">ENTER TO SEND · SHIFT + ENTER FOR A NEW LINE</text><text x="1370" y="866" font-size="8" letter-spacing="1" fill="#746e65">0 / 4000</text>
  </g>
</svg>
